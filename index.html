<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة Pong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .scores {
            display: flex;
            gap: 80px;
            justify-content: center;
            margin-bottom: 20px;
            color: #00ff00;
            font-size: 28px;
            font-weight: bold;
        }

        canvas {
            background: #000;
            border: 3px solid #00ff00;
            display: block;
            box-shadow: 0 0 20px #00ff00;
        }

        .info {
            color: #888;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.8;
        }

        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 لعبة Pong</h1>
        <div class="scores">
            <div>أنت: <span id="playerScore">0</span></div>
            <div>الكمبيوتر: <span id="computerScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="info">
            <p>⬆️ ⬇️ استخدم أسهم لوحة المفاتيح للتحكم بالمضرب الأيسر</p>
            <p>🖱️ أو حرّك الماوس لأعلى وأسفل</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let playerScore = 0;
        let computerScore = 0;

        // مضربك (يسار)
        const player = {
            x: 15,
            y: canvas.height / 2 - 50,
            width: 12,
            height: 100,
            dy: 0,
            speed: 7
        };

        // مضرب الكمبيوتر (يمين)
        const computer = {
            x: canvas.width - 27,
            y: canvas.height / 2 - 50,
            width: 12,
            height: 100,
            dy: 0,
            speed: 5.5
        };

        // الكرة
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: 5,
            dy: 5
        };

        const keys = {};
        let mouseY = canvas.height / 2;

        // التحكم بلوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // التحكم بالماوس
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // تحريك مضربك
        function updatePlayer() {
            // الأسهم
            if (keys['ArrowUp']) {
                player.dy = -player.speed;
            } else if (keys['ArrowDown']) {
                player.dy = player.speed;
            } else {
                // الماوس
                const center = player.y + player.height / 2;
                if (mouseY < center - 10) {
                    player.dy = -player.speed * 0.8;
                } else if (mouseY > center + 10) {
                    player.dy = player.speed * 0.8;
                } else {
                    player.dy = 0;
                }
            }

            player.y += player.dy;

            // منع الخروج من الحدود
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        // تحريك مضرب الكمبيوتر
        function updateComputer() {
            const center = computer.y + computer.height / 2;
            const diff = ball.y - center;

            if (Math.abs(diff) > 20) {
                computer.dy = Math.sign(diff) * computer.speed;
            } else {
                computer.dy = 0;
            }

            computer.y += computer.dy;

            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // تحريك الكرة والاصطدامات
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // ارتداد من الأعلى والأسفل
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }

            // اصطدام بمضربك
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = Math.abs(ball.dx);
                const collidePoint = ball.y - (player.y + player.height / 2);
                ball.dy = collidePoint * 0.08;
            }

            // اصطدام بمضرب الكمبيوتر
            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -Math.abs(ball.dx);
                const collidePoint = ball.y - (computer.y + computer.height / 2);
                ball.dy = collidePoint * 0.08;
            }

            // نقاط
            if (ball.x < 0) {
                computerScore++;
                document.getElementById('computerScore').textContent = computerScore;
                resetBall();
            }
            if (ball.x > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall();
            }
        }

        // إعادة الكرة للمنتصف
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
        }

        // الرسم
        function draw() {
            // خلفية سوداء
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم المضارب
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

            // رسم الكرة
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff00';
            ctx.fill();

            // خط في المنتصف
            ctx.strokeStyle = '#444';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // حلقة اللعبة
        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>

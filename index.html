<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة Pong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        /* نمط شاشة التسجيل */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .login-box {
            background: #222;
            border: 3px solid #00ff00;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 30px #00ff00;
        }

        .login-box h2 {
            color: #00ff00;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #111;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }

        .login-box input::placeholder {
            color: #666;
        }

        .login-box input:focus {
            box-shadow: 0 0 10px #00ff00;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #00cc00;
            box-shadow: 0 0 15px #00ff00;
        }

        .login-screen.hidden {
            display: none;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 36px;
        }

        .player-info {
            color: #888;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .player-info span {
            color: #00ff00;
            font-weight: bold;
        }

        .scores {
            display: flex;
            gap: 80px;
            justify-content: center;
            margin-bottom: 20px;
            color: #00ff00;
            font-size: 28px;
            font-weight: bold;
        }

        canvas {
            background: #000;
            border: 3px solid #00ff00;
            display: block;
            box-shadow: 0 0 20px #00ff00;
        }

        .info {
            color: #888;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.8;
        }

        .info p {
            margin: 5px 0;
        }

        .logout-btn {
            margin-top: 15px;
        }

        .logout-btn button {
            padding: 8px 20px;
            background: #ff4444;
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .logout-btn button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <!-- شاشة التسجيل -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🎮 تسجيل الدخول</h2>
            <input 
                type="text" 
                id="playerName" 
                placeholder="أدخل اسمك" 
                maxlength="20"
            >
            <input 
                type="email" 
                id="playerEmail" 
                placeholder="أدخل بريدك الإلكتروني" 
            >
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <!-- شاشة اللعبة -->
    <div class="container" id="gameContainer" style="display: none;">
        <h1>🎮 لعبة Pong</h1>
        <div class="player-info">
            👤 اللاعب: <span id="displayPlayerName">-</span>
        </div>
        <div class="scores">
            <div>أنت: <span id="playerScore">0</span></div>
            <div>الكمبيوتر: <span id="computerScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="info">
            <p>⬆️ ⬇️ استخدم أسهم لوحة المفاتيح للتحكم بالمضرب الأيسر</p>
            <p>🖱️ أو حرّك الماوس لأعلى وأسفل</p>
        </div>
        <div class="logout-btn">
            <button onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        let currentPlayer = null;

        // التحقق من وجود لاعب مسجل
        function checkLogin() {
            const saved = localStorage.getItem('pongPlayer');
            if (saved) {
                currentPlayer = JSON.parse(saved);
                startGame();
            }
        }

        // تسجيل الدخول
        function login() {
            const name = document.getElementById('playerName').value.trim();
            const email = document.getElementById('playerEmail').value.trim();

            if (!name || !email) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }

            if (!email.includes('@')) {
                alert('الرجاء إدخال بريد إلكتروني صحيح');
                return;
            }

            currentPlayer = {
                name: name,
                email: email,
                joinDate: new Date().toLocaleString('ar-EG')
            };

            localStorage.setItem('pongPlayer', JSON.stringify(currentPlayer));
            startGame();
        }

        // بدء اللعبة
        function startGame() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('gameContainer').style.display = 'block';
            document.getElementById('displayPlayerName').textContent = currentPlayer.name;
            initGame();
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('pongPlayer');
                location.reload();
            }
        }

        // متغيرات اللعبة
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let playerScore = 0;
        let computerScore = 0;

        const player = {
            x: 15,
            y: canvas.height / 2 - 50,
            width: 12,
            height: 100,
            dy: 0,
            speed: 7
        };

        const computer = {
            x: canvas.width - 27,
            y: canvas.height / 2 - 50,
            width: 12,
            height: 100,
            dy: 0,
            speed: 5.5
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: 5,
            dy: 5
        };

        const keys = {};
        let mouseY = canvas.height / 2;
        let gameInitialized = false;

        function initGame() {
            if (gameInitialized) return;
            gameInitialized = true;

            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseY = e.clientY - rect.top;
            });

            gameLoop();
        }

        function updatePlayer() {
            if (keys['ArrowUp']) {
                player.dy = -player.speed;
            } else if (keys['ArrowDown']) {
                player.dy = player.speed;
            } else {
                const center = player.y + player.height / 2;
                if (mouseY < center - 10) {
                    player.dy = -player.speed * 0.8;
                } else if (mouseY > center + 10) {
                    player.dy = player.speed * 0.8;
                } else {
                    player.dy = 0;
                }
            }

            player.y += player.dy;

            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        function updateComputer() {
            const center = computer.y + computer.height / 2;
            const diff = ball.y - center;

            if (Math.abs(diff) > 20) {
                computer.dy = Math.sign(diff) * computer.speed;
            } else {
                computer.dy = 0;
            }

            computer.y += computer.dy;

            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }

            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = Math.abs(ball.dx);
                const collidePoint = ball.y - (player.y + player.height / 2);
                ball.dy = collidePoint * 0.08;
            }

            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -Math.abs(ball.dx);
                const collidePoint = ball.y - (computer.y + computer.height / 2);
                ball.dy = collidePoint * 0.08;
            }

            if (ball.x < 0) {
                computerScore++;
                document.getElementById('computerScore').textContent = computerScore;
                resetBall();
            }
            if (ball.x > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff00';
            ctx.fill();

            ctx.strokeStyle = '#444';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // التحقق من التسجيل عند التحميل
        checkLogin();
    </script>
</body>
</html>
